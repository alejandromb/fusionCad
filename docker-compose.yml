# ============================================================
# WARNING: Your project data lives in the Docker volume below.
#
#   SAFE:     docker-compose down      (stops container, keeps data)
#   SAFE:     docker-compose restart   (restarts container, keeps data)
#   DESTROYS: docker-compose down -v   (DELETES ALL PROJECT DATA!)
#   DESTROYS: docker volume rm ...     (DELETES ALL PROJECT DATA!)
#
# Always run `npm run db:backup` BEFORE any destructive operation.
# ============================================================
services:
  db:
    image: postgres:15-alpine
    container_name: fusion-cad-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fusion_cad
    ports:
      - "5433:5432"
    volumes:
      - fusion_cad_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fusion_cad_db_data:
